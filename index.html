<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a5" />
    <title>Operaciones Trébol - Formularios Offline</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Operaciones Trébol</h1>
      <p>Captura de formatos offline con sincronización a Google Sheets.</p>
      <div class="status">
        <span id="connectionStatus" class="badge">Sin conexión</span>
        <span id="pendingCount" class="badge neutral">Pendientes: 0</span>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>Nuevo registro</h2>

        <label for="templateSelect">Tipo de formato</label>
        <select id="templateSelect">
          <option value="declaracion_salud">Declaración jurada de salud</option>
          <option value="visita_general">Registro de visita general</option>
        </select>

        <form id="recordForm">
          <div class="grid">
            <label>
              Fecha
              <input name="fecha" type="date" required />
            </label>

            <label>
              Nombres y apellidos
              <input name="nombresApellidos" type="text" required maxlength="120" />
            </label>

            <label>
              DNI
              <input name="dni" type="text" inputmode="numeric" maxlength="12" required />
            </label>

            <label>
              Empresa
              <input name="empresa" type="text" required maxlength="120" />
            </label>

            <label>
              Área por visitar
              <input name="areaVisitar" type="text" required maxlength="120" />
            </label>

            <label class="full">
              Motivo de la visita
              <textarea name="motivoVisita" rows="3" required maxlength="500"></textarea>
            </label>

            <label>
              Firma (nombre)
              <input name="firmaNombre" type="text" required maxlength="120" />
            </label>
          </div>

          <div class="actions">
            <button type="submit">Guardar offline</button>
            <button type="button" id="syncButton" class="secondary">Sincronizar pendientes</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Registros locales</h2>
        <ul id="recordsList" class="records"></ul>
      </section>
    </main>

    <template id="recordItemTemplate">
      <li>
        <div>
          <strong class="record-title"></strong>
          <p class="record-meta"></p>
        </div>
        <span class="record-state"></span>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
